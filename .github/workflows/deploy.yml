name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]  # 你的主分支名，这里是main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 你的Node版本（18/20均可）
      
      - name: Install dependencies
        run: npm install
      
      - name: Build project
        run: npm run build  # 你的构建命令，打包后会生成dist目录
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # 指定部署dist目录内的文件
